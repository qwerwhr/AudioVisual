name: Build Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup npm mirror
        run: |
          npm config set registry https://registry.npmmirror.com
          echo "electron_mirror=https://registry.npmmirror.com/-/binary/electron/" >> .npmrc
          echo "electron_builder_binaries_mirror=https://registry.npmmirror.com/-/binary/electron-builder-binaries/" >> .npmrc
          echo "electron_custom_dir=${{ github.ref_type == 'tag' && github.ref_name || '33.4.11' }}" >> .npmrc

      - name: Install dependencies
        run: npm install

      - name: Build Windows installer
        run: npm run dist:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-installers
          path: dist/*.{exe,msi,blockmap,yml}

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup npm mirror
        run: |
          npm config set registry https://registry.npmmirror.com
          echo "electron_mirror=https://registry.npmmirror.com/-/binary/electron/" >> .npmrc
          echo "electron_builder_binaries_mirror=https://registry.npmmirror.com/-/binary/electron-builder-binaries/" >> .npmrc

      - name: Install dependencies
        run: npm install

      - name: Build macOS DMG
        run: npm run dist:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-installers
          path: dist/*.dmg

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libnotify-dev libnss3 libxss1 libasound2 libxtst6 xauth xvfb

      - name: Setup npm mirror
        run: |
          npm config set registry https://registry.npmmirror.com
          echo "electron_mirror=https://registry.npmmirror.com/-/binary/electron/" >> .npmrc
          echo "electron_builder_binaries_mirror=https://registry.npmmirror.com/-/binary/electron-builder-binaries/" >> .npmrc

      - name: Install dependencies
        run: npm install

      - name: Build Linux DEB
        run: npm run dist:linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-installers
          path: dist/*.deb

  release:
    name: Create Release
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
