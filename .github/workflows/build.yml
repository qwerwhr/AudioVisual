name: Build Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    env:
      ELECTRON_MIRROR: https://registry.npmmirror.com/-/binary/electron/
      ELECTRON_BUILDER_BINARIES_MIRROR: https://registry.npmmirror.com/-/binary/electron-builder-binaries/
      npm_config_registry: https://registry.npmjs.org/
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --registry https://registry.npmjs.org/

      - name: Build Windows installer
        run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-installers
          path: |
            dist/*.exe
            dist/*.msi
            dist/*.blockmap
            dist/*.yml

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    env:
      ELECTRON_MIRROR: https://registry.npmmirror.com/-/binary/electron/
      ELECTRON_BUILDER_BINARIES_MIRROR: https://registry.npmmirror.com/-/binary/electron-builder-binaries/
      npm_config_registry: https://registry.npmjs.org/
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --registry https://registry.npmjs.org/

      - name: Build macOS DMG
        run: npm run build:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-installers
          path: dist/*.dmg

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    env:
      ELECTRON_MIRROR: https://registry.npmmirror.com/-/binary/electron/
      ELECTRON_BUILDER_BINARIES_MIRROR: https://registry.npmmirror.com/-/binary/electron-builder-binaries/
      npm_config_registry: https://registry.npmjs.org/
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libnotify-dev libnss3 libxss1 libasound2t64 libxtst6 xauth xvfb

      - name: Install dependencies
        run: npm install --registry https://registry.npmjs.org/

      - name: Build Linux DEB
        run: npm run build:linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-installers
          path: dist/*.deb

  release:
    name: Create Release
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate latest.json for CDN
        run: |
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG_NAME#v}"
          echo "Generating latest.json for version $VERSION"
          cat > latest.json << EOF
          {
            "version": "$VERSION",
            "tag": "$TAG_NAME",
            "releaseDate": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "changelog": "",
            "files": {
              "windows-exe": "https://github.com/qwerwhr/AudioVisual/releases/download/$TAG_NAME/AudioVisual-${VERSION}-setup.exe",
              "windows-msi": "https://github.com/qwerwhr/AudioVisual/releases/download/$TAG_NAME/AudioVisual-${VERSION}.msi",
              "macos-dmg": "https://github.com/qwerwhr/AudioVisual/releases/download/$TAG_NAME/AudioVisual-${VERSION}.dmg",
              "linux-deb": "https://github.com/qwerwhr/AudioVisual/releases/download/$TAG_NAME/audiovisual_${VERSION}_amd64.deb"
            }
          }
          EOF
          cat latest.json

      - name: Commit latest.json to main branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout main
          cp latest.json latest.json
          git add latest.json
          git commit -m "chore: update latest.json for v${GITHUB_REF#refs/tags/v}" || echo "No changes to commit"
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
